<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Consulting Strategy Table</title>
  <desc id="desc">Vintage desk with maps, compass, and notes representing one-on-one strategy sessions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7EFD3"/>
      <stop offset="1" stop-color="#EBDCB3"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.07"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="900" height="520" fill="url(#bg)"/>
  <rect x="72" y="82" width="756" height="356" rx="8" fill="#F4EED1" stroke="#704214" stroke-width="4"/>
  <path d="M120 144 C 220 110, 380 190, 470 158 S 680 112, 780 150" fill="none" stroke="#704214" stroke-opacity="0.45" stroke-width="3"/>
  <path d="M120 236 C 260 206, 340 270, 470 238 S 680 190, 780 228" fill="none" stroke="#704214" stroke-opacity="0.35" stroke-width="3"/>
  <path d="M120 320 C 240 282, 360 360, 510 316 S 680 272, 786 310" fill="none" stroke="#704214" stroke-opacity="0.35" stroke-width="3"/>

  <g transform="translate(228 282)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#1A2A3A" stroke-width="5"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="#704214" stroke-width="3"/>
    <path d="M0 -54 L18 0 L0 54 L-18 0 Z" fill="#C5A059" fill-opacity="0.46" stroke="#1A2A3A" stroke-width="4"/>
    <circle cx="0" cy="0" r="6" fill="#1A2A3A"/>
  </g>

  <g transform="translate(560 170)">
    <rect x="0" y="0" width="210" height="134" fill="#F8F2DB" stroke="#1A2A3A" stroke-width="3"/>
    <line x1="18" y1="34" x2="184" y2="34" stroke="#704214" stroke-width="3" stroke-opacity="0.75"/>
    <line x1="18" y1="62" x2="194" y2="62" stroke="#704214" stroke-width="3" stroke-opacity="0.58"/>
    <line x1="18" y1="90" x2="170" y2="90" stroke="#704214" stroke-width="3" stroke-opacity="0.58"/>
    <line x1="18" y1="114" x2="150" y2="114" stroke="#704214" stroke-width="3" stroke-opacity="0.58"/>
  </g>

  <g transform="translate(500 338)" stroke="#1A2A3A" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 0 L150 -70"/>
    <path d="M140 -74 L176 -108"/>
    <path d="M176 -108 L190 -95"/>
    <circle cx="0" cy="0" r="9" fill="#1A2A3A"/>
  </g>

  <text x="88" y="482" fill="#704214" font-family="serif" font-size="26">Private narrative cartography in session</text>
  <rect width="900" height="520" filter="url(#grain)"/>
</svg>